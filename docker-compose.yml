services:
  postgres:
    image: postgres:16-alpine
    container_name: notescool-db
    environment:
      POSTGRES_DB: notescool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: notescool-backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=notescool;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    container_name: notescool-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
