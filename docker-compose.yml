services:
  postgres:
    image: postgres:16-alpine
    container_name: notescool-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_INTERNAL_NAME:-notescool}
      POSTGRES_USER: ${DATABASE_INTERNAL_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_INTERNAL_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_INTERNAL_USER:-postgres} -d ${DATABASE_INTERNAL_NAME:-notescool}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: notescool-backend
    env_file:
      - path: ${NOTESCOOL_ENV_FILE:-/etc/sysconfig/notescool}
        required: false
    environment:
      - Database__Internal__Host=${DATABASE_INTERNAL_HOST:-postgres}
      - Database__Internal__Port=${DATABASE_INTERNAL_PORT:-5432}
      - Database__Internal__Name=${DATABASE_INTERNAL_NAME:-notescool}
      - Database__Internal__User=${DATABASE_INTERNAL_USER:-postgres}
      - Database__Internal__Password=${DATABASE_INTERNAL_PASSWORD:-postgres}
      - ASPNETCORE_ENVIRONMENT=Development
      - SSO_GOOGLE_ENABLED=${SSO_GOOGLE_ENABLED:-false}
      - SSO_GOOGLE_CLIENT_ID=${SSO_GOOGLE_CLIENT_ID:-}
      - SSO_GOOGLE_CLIENT_SECRET=${SSO_GOOGLE_CLIENT_SECRET:-}
      - SSO_GOOGLE_AUTHORITY=${SSO_GOOGLE_AUTHORITY:-https://accounts.google.com}
      - SSO_GOOGLE_CALLBACK_PATH=${SSO_GOOGLE_CALLBACK_PATH:-/signin-google}
      - SSO_GOOGLE_REDIRECT_URLS=${SSO_GOOGLE_REDIRECT_URLS:-https://localhost:10001/auth/callback/google}
      - SSO_MICROSOFT_ENABLED=${SSO_MICROSOFT_ENABLED:-false}
      - SSO_MICROSOFT_CLIENT_ID=${SSO_MICROSOFT_CLIENT_ID:-}
      - SSO_MICROSOFT_CLIENT_SECRET=${SSO_MICROSOFT_CLIENT_SECRET:-}
      - SSO_MICROSOFT_AUTHORITY=${SSO_MICROSOFT_AUTHORITY:-https://login.microsoftonline.com/common/v2.0}
      - SSO_MICROSOFT_CALLBACK_PATH=${SSO_MICROSOFT_CALLBACK_PATH:-/signin-microsoft}
      - SSO_MICROSOFT_REDIRECT_URLS=${SSO_MICROSOFT_REDIRECT_URLS:-https://note.tripschill.com/api/auth/sso/microsoft/callback}
    ports:
      - "10002:10002"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: notescool-frontend
    ports:
      - "10001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
