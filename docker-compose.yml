services:
  postgres:
    image: postgres:16-alpine
    container_name: notescool-db
    environment:
      POSTGRES_DB: notescool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: notescool-backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=notescool;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
      - Sso__Providers__0__Name=Google
      - Sso__Providers__0__Enabled=false
      - Sso__Providers__0__ClientId=${GOOGLE_SSO_CLIENT_ID:-}
      - Sso__Providers__0__ClientSecret=${GOOGLE_SSO_CLIENT_SECRET:-__SET_IN_ENV__}
      - Sso__Providers__0__Authority=https://accounts.google.com
      - Sso__Providers__0__CallbackPath=/signin-google
      - Sso__Providers__0__RedirectUrls__0=${GOOGLE_SSO_REDIRECT_URL:-http://localhost:10001/auth/callback/google}
      - Sso__Providers__1__Name=Microsoft
      - Sso__Providers__1__Enabled=false
      - Sso__Providers__1__ClientId=${MICROSOFT_SSO_CLIENT_ID:-}
      - Sso__Providers__1__ClientSecret=${MICROSOFT_SSO_CLIENT_SECRET:-__SET_IN_ENV__}
      - Sso__Providers__1__Authority=https://login.microsoftonline.com/common/v2.0
      - Sso__Providers__1__CallbackPath=/signin-microsoft
      - Sso__Providers__1__RedirectUrls__0=${MICROSOFT_SSO_REDIRECT_URL:-http://localhost:10001/auth/callback/microsoft}
    ports:
      - "10002:10002"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: notescool-frontend
    ports:
      - "10001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
